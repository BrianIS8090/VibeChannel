<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>VibeChannel — Pixel Room</title><style>
:root{--page:#111827;--ink:#101018;--panel:#ffe6a3;--panel2:#ffd166;--button:#a7f3d0;--buttonText:#101018;--accent:#f472b6;--muted:#6b5f78;--shadow:#050713}
*{box-sizing:border-box;margin:0;padding:0}html{background:#171224}body{min-height:100vh;color:var(--ink);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;font-size:14px;line-height:1.4;background:var(--page);image-rendering:pixelated;overflow-x:hidden}button,textarea{font:inherit;color:inherit}button{cursor:pointer;border:0;background:transparent}textarea{resize:none}.wrap{width:min(1080px,100%);margin:auto;padding:14px 12px 88px}.pixel{border:4px solid var(--ink);box-shadow:8px 8px 0 var(--shadow);background:var(--panel)}.soft{border:3px solid var(--ink);box-shadow:5px 5px 0 var(--shadow);background:var(--panel2)}.btn{min-height:46px;padding:10px 12px;border:3px solid var(--ink);background:var(--button);box-shadow:4px 4px 0 var(--shadow);font-weight:800;text-transform:uppercase;text-align:center}.btn:active{transform:translate(3px,3px);box-shadow:1px 1px 0 var(--shadow)}.btn.active{background:var(--accent);color:var(--buttonText)}.tiny{font-size:12px;color:var(--muted)}.toast{position:fixed;left:50%;bottom:78px;transform:translateX(-50%) translateY(14px);opacity:0;z-index:20;border:3px solid var(--ink);box-shadow:5px 5px 0 var(--shadow);background:var(--panel);padding:10px 12px;transition:.14s;white-space:nowrap}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.nav{position:fixed;left:10px;right:10px;bottom:10px;z-index:12;display:grid;grid-template-columns:repeat(4,1fr);border:4px solid var(--ink);box-shadow:5px 5px 0 var(--shadow);background:var(--panel)}.nav button{min-height:56px;border-right:3px solid var(--ink);font-size:12px}.nav button:last-child{border-right:0}.nav .active{background:var(--accent);color:var(--buttonText)}

.wrap{max-width:920px}.layout{display:grid;gap:14px}.scene{min-height:440px;padding:12px;background:#1f1b3f;position:relative;overflow:hidden}.window{height:138px;border:4px solid var(--ink);background:linear-gradient(#1d2b69 0 70%,#0e153a 70%);position:relative}.window:before{content:"";position:absolute;left:45%;top:0;bottom:0;border-left:4px solid var(--ink)}.window:after{content:"";position:absolute;left:0;right:0;top:50%;border-top:4px solid var(--ink)}.star{position:absolute;color:#fff;font-size:18px}.s1{left:22px;top:20px}.s2{right:34px;top:36px}.s3{left:58%;top:18px}.desk{position:absolute;left:18px;right:18px;bottom:80px;height:72px;background:#8b5e34;border:4px solid var(--ink);box-shadow:0 14px 0 #5d3821}.radio{position:absolute;left:50%;bottom:118px;transform:translateX(-50%);width:230px;height:128px;background:#f9b65c;border:4px solid var(--ink);box-shadow:7px 7px 0 var(--shadow);display:grid;grid-template-columns:1fr 70px;gap:12px;padding:12px}.speaker{background:repeating-linear-gradient(90deg,#101018 0 5px,#f9b65c 5px 12px);border:3px solid var(--ink)}.knob{width:54px;height:54px;border:4px solid var(--ink);background:#a7f3d0;margin:auto;box-shadow:inset -8px -8px 0 rgba(0,0,0,.12)}.cat{position:absolute;left:28px;bottom:154px;width:60px;height:42px;background:#101018;border:4px solid #050713}.cat:before,.cat:after{content:"";position:absolute;top:-18px;border-left:12px solid transparent;border-right:12px solid transparent;border-bottom:18px solid #101018}.cat:before{left:4px}.cat:after{right:4px}.info{padding:14px}.station{font-size:clamp(28px,9vw,58px);line-height:.9;letter-spacing:-2px;text-transform:uppercase}.track{margin-top:8px;color:var(--muted)}.buttons{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:8px;margin-top:12px}.playlist{display:grid;gap:8px}.song{padding:11px;border:3px solid var(--ink);background:#fff0bd;box-shadow:4px 4px 0 var(--shadow);display:flex;justify-content:space-between}.song.active{background:#a7f3d0}.moodbar{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}@media(min-width:860px){.layout{grid-template-columns:1fr 320px}.scene{min-height:620px}.nav{position:static;margin-top:12px}}
</style></head><body><main class="wrap"><section class="layout"><article class="pixel"><div class="scene"><div class="window"><span class="star s1">✦</span><span class="star s2">✧</span><span class="star s3">✦</span></div><div class="cat"></div><div class="radio"><div class="speaker"></div><div class="knob"></div></div><div class="desk"></div></div><div class="info"><div class="tiny">сейчас играет</div><h1 class="station" id="title">Rain Bits</h1><p class="track" id="track">quiet rain / pixel room / 96kbps</p><div class="buttons"><button class="btn active" id="play">play</button><button class="btn" id="scan">next</button><button class="btn" id="fav">♥</button></div></div></article><aside><div class="soft" style="padding:12px"><div class="tiny">выбери эфир</div><div class="playlist"><button class="song active" data-title="Rain Bits" data-track="quiet rain / pixel room / 96kbps"><b>Rain Bits</b><span>88</span></button><button class="song" data-title="Soft Quest" data-track="8-bit chill / coding / 128kbps"><b>Soft Quest</b><span>92</span></button><button class="song" data-title="Night Save" data-track="slow jazz / save point / 192kbps"><b>Night Save</b><span>107</span></button></div><div class="moodbar"><button class="btn active">ночь</button><button class="btn">код</button><button class="btn">дождь</button><button class="btn">сон</button></div></div><nav class="nav"><button class="active">эфир</button><button>лист</button><button>♥</button><button>note</button></nav></aside></section></main><div class="toast" id="toast">ok</div><script>const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)],toast=$('#toast');function ping(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1000)}$$('.song').forEach(r=>r.onclick=()=>{$$('.song').forEach(x=>x.classList.remove('active'));r.classList.add('active');$('#title').textContent=r.dataset.title;$('#track').textContent=r.dataset.track;ping('эфир выбран')});$('#play').onclick=()=>{$('#play').classList.toggle('active');ping($('#play').classList.contains('active')?'play':'pause')};$('#scan').onclick=()=>{let a=$$('.song');a[Math.floor(Math.random()*a.length)].click()};$('#fav').onclick=()=>ping('сохранено')</script></body></html>
