<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>VibeChannel — Pixel Jukebox</title><style>
:root{--page:linear-gradient(180deg,#082032,#06121f);--ink:#07111d;--panel:#ffcf70;--panel2:#f87171;--button:#93c5fd;--buttonText:#07111d;--accent:#fef08a;--muted:#9fb7d1;--shadow:#020711}
*{box-sizing:border-box;margin:0;padding:0}html{background:#171224}body{min-height:100vh;color:var(--ink);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;font-size:14px;line-height:1.4;background:var(--page);image-rendering:pixelated;overflow-x:hidden}button,textarea{font:inherit;color:inherit}button{cursor:pointer;border:0;background:transparent}textarea{resize:none}.wrap{width:min(1080px,100%);margin:auto;padding:14px 12px 88px}.pixel{border:4px solid var(--ink);box-shadow:8px 8px 0 var(--shadow);background:var(--panel)}.soft{border:3px solid var(--ink);box-shadow:5px 5px 0 var(--shadow);background:var(--panel2)}.btn{min-height:46px;padding:10px 12px;border:3px solid var(--ink);background:var(--button);box-shadow:4px 4px 0 var(--shadow);font-weight:800;text-transform:uppercase;text-align:center}.btn:active{transform:translate(3px,3px);box-shadow:1px 1px 0 var(--shadow)}.btn.active{background:var(--accent);color:var(--buttonText)}.tiny{font-size:12px;color:var(--muted)}.toast{position:fixed;left:50%;bottom:78px;transform:translateX(-50%) translateY(14px);opacity:0;z-index:20;border:3px solid var(--ink);box-shadow:5px 5px 0 var(--shadow);background:var(--panel);padding:10px 12px;transition:.14s;white-space:nowrap}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.nav{position:fixed;left:10px;right:10px;bottom:10px;z-index:12;display:grid;grid-template-columns:repeat(4,1fr);border:4px solid var(--ink);box-shadow:5px 5px 0 var(--shadow);background:var(--panel)}.nav button{min-height:56px;border-right:3px solid var(--ink);font-size:12px}.nav button:last-child{border-right:0}.nav .active{background:var(--accent);color:var(--buttonText)}

.wrap{max-width:980px}.hero{display:grid;gap:14px}.jukebox{padding:16px;background:#ef6f6c}.sign{background:#fef08a;border:4px solid var(--ink);box-shadow:5px 5px 0 var(--shadow);padding:10px;text-align:center;font-size:22px;font-weight:900;letter-spacing:-1px}.tower{margin:18px auto 0;width:min(290px,100%);height:390px;border:4px solid var(--ink);background:#16213e;box-shadow:8px 8px 0 var(--shadow);padding:16px;display:flex;flex-direction:column;justify-content:space-between}.display{background:#b8f7d4;border:4px solid var(--ink);padding:14px;min-height:170px}.station{font-size:34px;line-height:.9;letter-spacing:-2px;text-transform:uppercase;color:#07111d}.track{font-size:13px;color:#334155;margin-top:8px}.antenna{height:86px;display:grid;grid-template-columns:repeat(7,1fr);gap:5px;align-items:end}.antenna i{background:#fef08a;border:3px solid var(--ink);height:20px}.antenna i:nth-child(2n){height:44px}.antenna i:nth-child(3n){height:66px}.controls{display:grid;grid-template-columns:1fr 1fr;gap:8px}.controls .play{grid-column:1/-1;background:#fef08a}.side{display:grid;gap:12px}.card{padding:12px}.choice{display:grid;grid-template-columns:1fr auto;gap:8px;width:100%;padding:10px;margin-top:8px;border:3px solid var(--ink);background:#fff3bd;box-shadow:4px 4px 0 var(--shadow)}.choice.active{background:#93c5fd}.chips{display:flex;gap:8px;overflow:auto;padding-top:8px}.chip{flex:0 0 auto;border:3px solid var(--ink);background:#fff3bd;box-shadow:3px 3px 0 var(--shadow);padding:8px 10px}.chip.active{background:#fef08a}.note{width:100%;height:94px;border:3px solid var(--ink);background:#fff3bd;padding:10px;margin-top:8px}@media(min-width:860px){.hero{grid-template-columns:1fr 330px;align-items:start}.tower{height:540px}.display{min-height:230px}.station{font-size:52px}.nav{position:static;margin-top:12px}}
</style></head><body><main class="wrap"><section class="hero"><article class="pixel jukebox"><div class="sign">VIBE CHANNEL FM</div><div class="tower" id="tower"><div class="display"><div class="tiny">on air</div><h1 class="station" id="title">Moon<br>Jazz</h1><p class="track" id="track">late night / soft sax / pixel city</p></div><div class="antenna"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div><div class="controls"><button class="btn play" id="play">play</button><button class="btn" id="scan">scan</button><button class="btn" id="fav">save</button></div></div></article><aside class="side"><section class="soft card"><div class="tiny">каналы</div><button class="choice active" data-title="Moon\nJazz" data-track="late night / soft sax / pixel city"><b>Moon Jazz</b><span>107</span></button><button class="choice" data-title="Code\nQuest" data-track="8-bit focus / low noise / 128kbps"><b>Code Quest</b><span>92</span></button><button class="choice" data-title="Sea\nSleep" data-track="waves / slow pads / calm"><b>Sea Sleep</b><span>88</span></button></section><section class="soft card"><div class="tiny">настроение</div><div class="chips"><button class="chip active">ночь</button><button class="chip">город</button><button class="chip">код</button><button class="chip">сон</button></div></section><section class="soft card"><div class="tiny">заметка</div><textarea class="note" placeholder="коротко про эфир..."></textarea></section><nav class="nav"><button class="active">fm</button><button>list</button><button>♥</button><button>note</button></nav></aside></section></main><div class="toast" id="toast">ok</div><script>const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)],toast=$('#toast');function ping(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1000)}$$('.choice').forEach(r=>r.onclick=()=>{$$('.choice').forEach(x=>x.classList.remove('active'));r.classList.add('active');$('#title').innerHTML=r.dataset.title.replace('\\n','<br>');$('#track').textContent=r.dataset.track;ping('канал')});$('#play').onclick=()=>{$('#play').classList.toggle('active');ping($('#play').classList.contains('active')?'playing':'pause')};$('#scan').onclick=()=>{let a=$$('.choice');a[Math.floor(Math.random()*a.length)].click()};$('#fav').onclick=()=>ping('saved');$$('.chip').forEach(c=>c.onclick=()=>{$$('.chip').forEach(x=>x.classList.remove('active'));c.classList.add('active')})</script></body></html>
