*{box-sizing:border-box;margin:0;padding:0}html{background:#050806}body{min-height:100vh;color:var(--fg);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;-webkit-font-smoothing:antialiased;overflow-x:hidden}button,textarea,input{font:inherit}button{cursor:pointer}a{color:inherit}.scanlines:before{content:"";position:fixed;inset:0;pointer-events:none;background:linear-gradient(rgba(255,255,255,.035) 50%,transparent 50%);background-size:100% 4px;mix-blend-mode:screen;opacity:.35;z-index:20}.noise:after{content:"";position:fixed;inset:0;pointer-events:none;background-image:radial-gradient(rgba(255,255,255,.08) 1px,transparent 1px);background-size:3px 3px;opacity:.08;z-index:21}.toast{position:fixed;left:50%;bottom:82px;transform:translateX(-50%) translateY(14px);opacity:0;z-index:30;padding:10px 14px;border:1px solid var(--line);background:var(--panel);color:var(--accent);box-shadow:0 0 30px var(--glow);transition:.18s;white-space:nowrap}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

body{background:radial-gradient(circle at 50% -20%,rgba(200,255,90,.16),transparent 30rem),linear-gradient(180deg,#090b07,#171409)}.wrap{width:min(1160px,100%);margin:auto;padding:14px 12px 88px}.cabinet{border:2px solid rgba(200,255,90,.22);border-radius:28px;background:linear-gradient(145deg,#182012,#0b0d08);box-shadow:inset 0 0 0 1px rgba(255,255,255,.04),0 30px 90px rgba(0,0,0,.48);padding:12px}.brand{display:flex;justify-content:space-between;align-items:center;gap:10px;color:var(--accent);font-size:13px;margin-bottom:10px;text-transform:uppercase;letter-spacing:.08em}.brand span{color:var(--muted);font-size:11px;text-align:right}.grid{display:grid;gap:12px}.crt{min-height:420px;border-radius:24px;border:1px solid var(--line);background:radial-gradient(circle at 50% 45%,rgba(200,255,90,.14),transparent 34%),#050703;box-shadow:inset 0 0 80px rgba(200,255,90,.09),inset 0 0 18px rgba(0,0,0,.8);padding:16px;position:relative;overflow:hidden}.crt:after{content:"";position:absolute;inset:10px;border-radius:18px;border:1px solid rgba(200,255,90,.08);pointer-events:none}.label{color:var(--muted);font-size:12px;margin-bottom:22px}.station{font-size:clamp(34px,12vw,82px);line-height:.86;letter-spacing:-.08em;color:#fbffe8;text-transform:uppercase;text-shadow:0 0 26px rgba(200,255,90,.28)}.track{margin-top:14px;color:#dfff9f;font-size:13px;line-height:1.55;max-width:680px}.scope{display:flex;align-items:end;gap:3px;height:80px;margin-top:28px;border-top:1px dashed rgba(200,255,90,.2);padding-top:12px}.scope i{display:block;flex:1;min-width:3px;background:var(--accent);height:20px;box-shadow:0 0 14px var(--glow);animation:scope 1.2s infinite alternate}.scope i:nth-child(3n){height:58px;animation-delay:.2s}.scope i:nth-child(4n){height:34px;animation-delay:.4s}.scope i:nth-child(5n){height:72px;animation-delay:.6s}@keyframes scope{to{transform:scaleY(.28);opacity:.55}}.paused .scope i{animation-play-state:paused;opacity:.3}.knobs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}button{border:1px solid var(--line);background:rgba(200,255,90,.06);color:var(--fg);min-height:52px;border-radius:16px;padding:0 12px}.play{grid-column:1/-1;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#121507;font-weight:900;border:0}.panel{border:1px solid var(--line);border-radius:22px;background:rgba(10,13,7,.78);padding:12px}.panel h2{font-size:12px;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}.preset{width:100%;display:flex;justify-content:space-between;text-align:left;margin-bottom:8px;border-radius:14px;background:rgba(255,255,255,.025)}.preset.active{background:rgba(200,255,90,.12);box-shadow:inset 0 0 0 1px var(--line)}.preset small{display:block;color:var(--muted);margin-top:4px}.moods{display:grid;grid-template-columns:1fr 1fr;gap:8px}.moods button.active{color:#111507;background:var(--accent)}textarea{width:100%;min-height:112px;border:1px solid var(--line);border-radius:16px;background:#050703;color:var(--fg);padding:12px;resize:vertical}.footer{position:fixed;left:10px;right:10px;bottom:10px;border:1px solid var(--line);border-radius:22px;background:rgba(9,11,7,.94);display:grid;grid-template-columns:repeat(4,1fr);z-index:15;overflow:hidden}.footer button{border:0;border-right:1px solid var(--line);border-radius:0;min-height:60px;font-size:12px;color:var(--muted);background:transparent}.footer button.active{color:var(--accent);background:rgba(200,255,90,.08)}@media(min-width:860px){.wrap{padding:28px}.cabinet{padding:18px;border-radius:34px}.grid{grid-template-columns:1.2fr .68fr}.crt{min-height:610px;padding:26px}.knobs{grid-template-columns:1.2fr 1fr 1fr}.play{grid-column:auto}.footer{position:static;margin-top:12px}}</style></head><body class="scanlines noise"><main class="wrap"><section class="cabinet"><header class="brand"><b>VibeChannel CRT-05</b><span>personal broadcast receiver</span></header><div class="grid"><article><div class="crt" id="crt"><div class= Null" data-track="тихий нуарный джаз · тёплый низ · вечерняя заметка" data-label="CHANNEL 11 / NULL JAZZ / SIGNAL LOCKED"><span><b>CH11 Jazz Null</b><small>manual · jazz</small></span><span>87%</span></button></section><section class="panel" style="margin-top:12px"><h2>mood bank</h2><div class="moods"><button class="active">night</button><button>coding</button><button>rain</button><button>weekend</button></div></section><section class="panel" style="margin-top:12px"><h2>tape note</h2><textarea placeholder="REC: заметка к эфиру..."></textarea></section><nav class="footer"><button class="active">CRT</button><button>PRESET</button><button>MEMORY</button><button>TAPE</button></nav></aside></div></section></main><div class="toast" id="toast">ok</div><script>const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)],toast=$('#toast'),crt=$('#crt');function ping(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1200)}$('#play').onclick=()=>{crt.classList.toggle('paused');$('#play').textContent=crt.classList.contains('paused')?'POWER / RESUME':'PAUSE';ping(crt.classList.contains('paused')?'paused':'playing')};$('#fav').onclick=()=>ping('stored in memory');$$('.preset').forEach(p=>p.onclick=()=>{$$('.preset').forEach(x=>x.classList.remove('active'));p.classList.add('active');$('#title').innerHTML=p.dataset.title.replace('\n','<br>');$('#track').textContent=p.dataset.track;$('#label').textContent=p.dataset.label;ping('channel tuned')});$('#scan').onclick=()=>{const p=$$('.preset');p[Math.floor(Math.random()*p.length)].click()};$$('.moods button').forEach(b=>b.onclick=()=>{$$('.moods button').forEach(x=>x.classList.remove('active'));b.classList.add('active');ping('mood '+b.textContent)})</script></body></html>
