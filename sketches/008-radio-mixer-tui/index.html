<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>VibeChannel — Radio Mixer TUI</title><style>
:root{--bg:#070706;--fg:#fff3d7;--muted:#b69b66;--accent:#ffb000;--line:rgba(255,176,0,.34);--sel:rgba(255,176,0,.12);--glow:rgba(255,176,0,.16)}
*{box-sizing:border-box;margin:0;padding:0}html{background:#040504}body{min-height:100vh;background:#040504;color:var(--fg);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;font-size:14px;line-height:1.35;overflow-x:hidden}button,textarea,input{font:inherit;color:inherit}button{background:transparent;border:0;cursor:pointer;text-align:left}textarea,input{background:transparent;border:0;outline:none}.app{width:min(1280px,100%);margin:0 auto;padding:8px 8px 72px}.term{border:1px solid var(--line);background:var(--bg);box-shadow:0 0 0 1px #000,0 0 40px var(--glow)}.row{display:flex;align-items:center;gap:8px}.muted{color:var(--muted)}.accent{color:var(--accent)}.hot{background:var(--accent);color:#020403}.box{border:1px solid var(--line);background:rgba(255,255,255,.015)}.box-title{display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding:4px 7px;color:var(--accent);font-size:12px;text-transform:uppercase}.box-body{padding:7px}.btn{border:1px solid var(--line);min-height:42px;padding:8px;background:rgba(255,255,255,.018)}.btn:hover,.btn.active{background:var(--sel);color:var(--accent)}.toast{position:fixed;left:50%;bottom:72px;transform:translateX(-50%) translateY(12px);opacity:0;z-index:20;border:1px solid var(--line);background:var(--bg);color:var(--accent);padding:8px 12px;box-shadow:0 0 28px var(--glow);transition:.15s;white-space:nowrap}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.scan:before{content:"";position:fixed;inset:0;pointer-events:none;background:linear-gradient(rgba(255,255,255,.035) 50%,transparent 50%);background-size:100% 4px;opacity:.22;z-index:30}.scan:after{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at center,transparent 58%,rgba(0,0,0,.3));z-index:31}.kbd{position:fixed;left:8px;right:8px;bottom:8px;display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--line);background:rgba(4,5,4,.96);z-index:10}.kbd button{min-height:54px;border-right:1px solid var(--line);text-align:center;color:var(--muted);font-size:12px}.kbd button:last-child{border-right:0}.kbd button.active{color:var(--accent);background:var(--sel)}

.header{display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding:5px 7px;color:var(--accent);font-size:12px}.grid{display:grid;gap:0}.cell{border-bottom:1px solid var(--line)}.big{min-height:250px}.tuner{display:grid;grid-template-columns:repeat(9,1fr);gap:2px;margin:12px 0}.tick{height:28px;border-left:1px solid var(--line);position:relative}.tick:after{content:attr(data-f);position:absolute;top:30px;left:-8px;color:var(--muted);font-size:10px}.needle{height:44px;background:linear-gradient(180deg,transparent,var(--accent),transparent);box-shadow:0 0 18px var(--glow)}.station-name{font-size:clamp(28px,9vw,64px);line-height:.92;letter-spacing:-.07em;text-transform:uppercase;color:#fff9e8}.sub{color:var(--muted);margin-top:7px}.levels{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:10px}.level{display:grid;grid-template-columns:58px 1fr;gap:7px;align-items:center;color:var(--muted);font-size:12px}.bar{height:16px;border:1px solid var(--line);padding:2px}.fill{display:block;height:100%;background:var(--accent);box-shadow:0 0 14px var(--glow);width:70%;animation:fill 1.2s infinite alternate}.level:nth-child(2) .fill{width:48%;animation-delay:.2s}.level:nth-child(3) .fill{width:86%;animation-delay:.35s}.level:nth-child(4) .fill{width:62%;animation-delay:.5s}@keyframes fill{to{width:25%;opacity:.6}}.paused .fill{animation-play-state:paused;opacity:.35}.console{display:grid;gap:6px}.ch{display:grid;grid-template-columns:28px 1fr 46px;gap:6px;border:1px solid transparent;padding:6px}.ch.active{border-color:var(--line);background:var(--sel)}.ch small{display:block;color:var(--muted)}.pads{display:grid;grid-template-columns:1fr 1fr;gap:6px}.cmd{border-top:1px solid var(--line);padding:6px 7px;color:var(--accent)}textarea{width:100%;min-height:90px;color:var(--fg);padding:4px}.play{text-align:center;background:var(--accent);color:#070706;font-weight:900}@media(min-width:900px){.app{padding:18px}.grid{grid-template-columns:1fr 360px;grid-template-areas:'main mixer' 'info mixer'}.maincell{grid-area:main}.infocell{grid-area:info}.mixercell{grid-area:mixer;border-left:1px solid var(--line);border-bottom:0}.cell{min-height:0}.big{min-height:440px}.kbd{position:static;margin-top:8px}.pads{grid-template-columns:repeat(4,1fr)}}
</style></head><body class="scan"><main class="app"><section class="term"><header class="header"><b>VIBECHANNEL // RADIO MIXER</b><span>REC ● SQL ● NET 41ms</span></header><div class="grid"><section class="cell maincell"><div class="box-title"><span>tuner</span><span id="freq">FM 101.7</span></div><div class="box-body big" id="player"><h1 class="station-name" id="title">Drone Zone</h1><p class="sub" id="track">ambient carrier / no drums / deep night</p><div class="tuner"><div class="tick" data-f="88"></div><div class="tick"></div><div class="tick" data-f="94"></div><div class="tick"></div><div class="tick needle"></div><div class="tick" data-f="102"></div><div class="tick"></div><div class="tick" data-f="108"></div><div class="tick"></div></div><div class="levels"><div class="level"><span>LOW</span><div class="bar"><i class="fill"></i></div></div><div class="level"><span>MID</span><div class="bar"><i class="fill"></i></div></div><div class="level"><span>HIGH</span><div class="bar"><i class="fill"></i></div></div><div class="level"><span>NOISE</span><div class="bar"><i class="fill"></i></div></div></div></div><div class="cmd">$ mixer route somafm/drone-zone --mood night</div></section><aside class="cell mixercell"><div class="box-title"><span>channels</span><span>4</span></div><div class="box-body console"><button class="ch active" data-title="Drone Zone" data-track="ambient carrier / no drums / deep night" data-freq="FM 101.7"><span>▶</span><span><b>DRONE</b><small>ambient</small></span><code>101</code></button><button class="ch" data-title="Groove Salad" data-track="downtempo / soft beats / coding" data-freq="FM 92.4"><span>□</span><span><b>GROOVE</b><small>chill</small></span><code>092</code></button><button class="ch" data-title="Rain Buffer" data-track="lofi rain / cached / sleep safe" data-freq="FM 88.9"><span>□</span><span><b>RAIN</b><small>lofi</small></span><code>088</code></button><button class="ch" data-title="Null Jazz" data-track="late jazz / low light / warm" data-freq="FM 107.3"><span>□</span><span><b>JAZZ</b><small>noir</small></span><code>107</code></button></div><div class="box-title"><span>transport</span><span>keys</span></div><div class="box-body pads"><button class="btn play" id="play">PLAY</button><button class="btn" id="scan">SCAN</button><button class="btn" id="fav">MEM</button><button class="btn">LOG</button></div></aside><section class="cell infocell"><div class="box-title"><span>night note</span><span>draft</span></div><div class="box-body"><textarea placeholder="> добавить заметку к эфиру"></textarea></div></section></div><nav class="kbd"><button class="active">F1<br>tuner</button><button>F2<br>mixer</button><button>F3<br>memory</button><button>F4<br>note</button></nav></section></main><div class="toast" id="toast">ok</div><script>const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)],toast=$('#toast'),player=$('#player');function ping(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1100)}$$('.ch').forEach(c=>c.onclick=()=>{$$('.ch').forEach(x=>{x.classList.remove('active');x.children[0].textContent='□'});c.classList.add('active');c.children[0].textContent='▶';$('#title').textContent=c.dataset.title;$('#track').textContent=c.dataset.track;$('#freq').textContent=c.dataset.freq;ping('route '+c.querySelector('b').textContent)});$('#play').onclick=()=>{player.classList.toggle('paused');$('#play').textContent=player.classList.contains('paused')?'PLAY':'PAUSE';ping($('#play').textContent)};$('#scan').onclick=()=>{const a=$$('.ch');a[Math.floor(Math.random()*a.length)].click()};$('#fav').onclick=()=>ping('stored')</script></body></html>
