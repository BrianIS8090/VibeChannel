<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>VibeChannel — Pocket TUI Radio</title><style>
:root{--bg:#05070c;--fg:#dce9ff;--muted:#7c8fac;--accent:#7dd3fc;--line:rgba(125,211,252,.32);--sel:rgba(125,211,252,.12);--glow:rgba(125,211,252,.18)}
*{box-sizing:border-box;margin:0;padding:0}html{background:#040504}body{min-height:100vh;background:#040504;color:var(--fg);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;font-size:14px;line-height:1.35;overflow-x:hidden}button,textarea,input{font:inherit;color:inherit}button{background:transparent;border:0;cursor:pointer;text-align:left}textarea,input{background:transparent;border:0;outline:none}.app{width:min(1280px,100%);margin:0 auto;padding:8px 8px 72px}.term{border:1px solid var(--line);background:var(--bg);box-shadow:0 0 0 1px #000,0 0 40px var(--glow)}.row{display:flex;align-items:center;gap:8px}.muted{color:var(--muted)}.accent{color:var(--accent)}.hot{background:var(--accent);color:#020403}.box{border:1px solid var(--line);background:rgba(255,255,255,.015)}.box-title{display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding:4px 7px;color:var(--accent);font-size:12px;text-transform:uppercase}.box-body{padding:7px}.btn{border:1px solid var(--line);min-height:42px;padding:8px;background:rgba(255,255,255,.018)}.btn:hover,.btn.active{background:var(--sel);color:var(--accent)}.toast{position:fixed;left:50%;bottom:72px;transform:translateX(-50%) translateY(12px);opacity:0;z-index:20;border:1px solid var(--line);background:var(--bg);color:var(--accent);padding:8px 12px;box-shadow:0 0 28px var(--glow);transition:.15s;white-space:nowrap}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.scan:before{content:"";position:fixed;inset:0;pointer-events:none;background:linear-gradient(rgba(255,255,255,.035) 50%,transparent 50%);background-size:100% 4px;opacity:.22;z-index:30}.scan:after{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at center,transparent 58%,rgba(0,0,0,.3));z-index:31}.kbd{position:fixed;left:8px;right:8px;bottom:8px;display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--line);background:rgba(4,5,4,.96);z-index:10}.kbd button{min-height:54px;border-right:1px solid var(--line);text-align:center;color:var(--muted);font-size:12px}.kbd button:last-child{border-right:0}.kbd button.active{color:var(--accent);background:var(--sel)}

.app{max-width:760px}.top{border-bottom:1px solid var(--line);padding:6px 7px;display:flex;justify-content:space-between;color:var(--accent);font-size:12px}.screen{padding:8px}.hero{border:1px solid var(--line);min-height:410px;padding:10px;display:flex;flex-direction:column;justify-content:space-between;background:rgba(125,211,252,.025)}.path{color:var(--muted);font-size:12px}.station{font-size:clamp(34px,14vw,86px);line-height:.86;letter-spacing:-.08em;text-transform:uppercase;color:#eef7ff;margin-top:24px}.track{color:var(--muted);margin-top:10px}.dial{margin:24px 0 12px}.scale{display:flex;justify-content:space-between;color:var(--muted);font-size:11px}.rail{height:22px;border:1px solid var(--line);margin-top:6px;position:relative}.rail:before{content:"";position:absolute;left:55%;top:-7px;width:2px;height:34px;background:var(--accent);box-shadow:0 0 18px var(--glow)}.wave{font-size:12px;color:var(--accent);white-space:nowrap;overflow:hidden;margin-top:10px}.paused .wave{opacity:.35}.actions{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}.actions .play{grid-column:1/-1;text-align:center;background:var(--accent);color:#05070c;font-weight:900}.list{display:grid;gap:5px;margin-top:8px}.item{display:grid;grid-template-columns:22px 1fr auto;gap:6px;border:1px solid transparent;padding:7px}.item.active{border-color:var(--line);background:var(--sel)}.item small{display:block;color:var(--muted)}.split{display:grid;gap:8px;margin-top:8px}.moods{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}textarea{width:100%;min-height:76px;color:var(--fg);padding:6px}.cmd{border-top:1px solid var(--line);padding:6px 7px;color:var(--accent)}@media(min-width:900px){.app{max-width:1180px;padding:18px}.screen{display:grid;grid-template-columns:1fr 360px;gap:8px}.hero{min-height:650px}.side{display:flex;flex-direction:column;gap:8px}.kbd{position:static;margin-top:8px}.actions{grid-template-columns:1fr 1fr 1fr}.actions .play{grid-column:auto}}
</style></head><body class="scan"><main class="app"><section class="term"><header class="top"><b>vibechannel pocket-tui</b><span>online</span></header><div class="screen"><section class="hero" id="player"><div><div class="path">~/radio/current <span class="accent">● live</span></div><h1 class="station" id="title">Rain<br>Buffer</h1><p class="track" id="track">lofi rain / quiet mobile night / 96kbps</p><div class="dial"><div class="scale"><span>88</span><span>92</span><span>98</span><span>104</span><span>108</span></div><div class="rail"></div><div class="wave">▁▂▃▆█▇▅▃▂▁ ▂▃▅▇█▆▄▂ ▁▂▄▆█▇▅▃ ▂▃▆█▇▅▂▁</div></div></div><div><div class="actions"><button class="btn play" id="play">PLAY / PAUSE</button><button class="btn" id="scan">SCAN</button><button class="btn" id="fav">SAVE</button></div></div></section><aside class="side"><section class="box"><div class="box-title"><span>queue</span><span>select</span></div><div class="box-body list"><button class="item active" data-title="Rain\nBuffer" data-track="lofi rain / quiet mobile night / 96kbps"><span>▶</span><span><b>Rain Buffer</b><small>Radio Browser</small></span><code>088</code></button><button class="item" data-title="Groove\nSalad" data-track="downtempo / coding / 128kbps"><span>·</span><span><b>Groove Salad</b><small>SomaFM</small></span><code>092</code></button><button class="item" data-title="Drone\nZone" data-track="ambient / deep night / 128kbps"><span>·</span><span><b>Drone Zone</b><small>SomaFM</small></span><code>101</code></button></div></section><section class="box"><div class="box-title"><span>mood</span><span>radio vibe</span></div><div class="box-body moods"><button class="btn active">night</button><button class="btn">code</button><button class="btn">rain</button></div></section><section class="box"><div class="box-title"><span>note</span><span>sqlite draft</span></div><div class="box-body"><textarea placeholder="> мысль под эфир"></textarea></div></section></aside></div><div class="cmd">$ play rain-buffer --ui=tui --theme=vibe-radio</div><nav class="kbd"><button class="active">F1<br>play</button><button>F2<br>queue</button><button>F3<br>mood</button><button>F4<br>note</button></nav></section></main><div class="toast" id="toast">ok</div><script>const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)],toast=$('#toast'),player=$('#player');function ping(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1100)}$$('.item').forEach(i=>i.onclick=()=>{$$('.item').forEach(x=>{x.classList.remove('active');x.children[0].textContent='·'});i.classList.add('active');i.children[0].textContent='▶';$('#title').innerHTML=i.dataset.title.replace('\\n','<br>');$('#track').textContent=i.dataset.track;ping('selected '+i.querySelector('b').textContent)});$('#play').onclick=()=>{player.classList.toggle('paused');ping(player.classList.contains('paused')?'paused':'playing')};$('#scan').onclick=()=>{const a=$$('.item');a[Math.floor(Math.random()*a.length)].click()};$('#fav').onclick=()=>ping('saved');</script></body></html>
