<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>VibeChannel — Pixel Pocket</title><style>
:root{--page:linear-gradient(180deg,#241b3d,#121628);--ink:#171224;--panel:#f6d99b;--panel2:#ffd86f;--button:#79d7ff;--buttonText:#171224;--accent:#ff7ab6;--muted:#6b5a7b;--shadow:#0b0d16}
*{box-sizing:border-box;margin:0;padding:0}html{background:#171224}body{min-height:100vh;color:var(--ink);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;font-size:14px;line-height:1.4;background:var(--page);image-rendering:pixelated;overflow-x:hidden}button,textarea{font:inherit;color:inherit}button{cursor:pointer;border:0;background:transparent}textarea{resize:none}.wrap{width:min(1080px,100%);margin:auto;padding:14px 12px 88px}.pixel{border:4px solid var(--ink);box-shadow:8px 8px 0 var(--shadow);background:var(--panel)}.soft{border:3px solid var(--ink);box-shadow:5px 5px 0 var(--shadow);background:var(--panel2)}.btn{min-height:46px;padding:10px 12px;border:3px solid var(--ink);background:var(--button);box-shadow:4px 4px 0 var(--shadow);font-weight:800;text-transform:uppercase;text-align:center}.btn:active{transform:translate(3px,3px);box-shadow:1px 1px 0 var(--shadow)}.btn.active{background:var(--accent);color:var(--buttonText)}.tiny{font-size:12px;color:var(--muted)}.toast{position:fixed;left:50%;bottom:78px;transform:translateX(-50%) translateY(14px);opacity:0;z-index:20;border:3px solid var(--ink);box-shadow:5px 5px 0 var(--shadow);background:var(--panel);padding:10px 12px;transition:.14s;white-space:nowrap}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.nav{position:fixed;left:10px;right:10px;bottom:10px;z-index:12;display:grid;grid-template-columns:repeat(4,1fr);border:4px solid var(--ink);box-shadow:5px 5px 0 var(--shadow);background:var(--panel)}.nav button{min-height:56px;border-right:3px solid var(--ink);font-size:12px}.nav button:last-child{border-right:0}.nav .active{background:var(--accent);color:var(--buttonText)}

.wrap{max-width:760px}.brand{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;color:#ffe9aa;text-shadow:3px 3px 0 #0b0d16}.brand h1{font-size:22px;letter-spacing:-1px}.handheld{padding:14px;border-radius:0}.screen{background:#9adf7c;min-height:300px;padding:14px;position:relative;overflow:hidden}.screen:before{content:"";position:absolute;inset:0;background:linear-gradient(transparent 50%,rgba(0,0,0,.08) 50%);background-size:100% 8px;pointer-events:none}.sky{height:84px;background:linear-gradient(#5a4d9e 0 55%,#30285d 55%);border:3px solid var(--ink);position:relative;box-shadow:inset 0 -8px 0 rgba(0,0,0,.08)}.moon{position:absolute;right:22px;top:14px;width:30px;height:30px;background:#ffe889;border:3px solid var(--ink);box-shadow:10px 0 0 #5a4d9e}.stars{position:absolute;left:18px;top:16px;color:#fff;font-size:18px;letter-spacing:18px}.radio-face{margin:18px auto 10px;width:min(260px,100%);height:112px;background:#f2b35e;border:4px solid var(--ink);box-shadow:6px 6px 0 rgba(0,0,0,.18);display:grid;grid-template-columns:1fr 76px;gap:12px;padding:12px}.speaker{border:3px solid var(--ink);background:repeating-linear-gradient(0deg,#171224 0 4px,#f2b35e 4px 10px)}.dial{border:4px solid var(--ink);background:#79d7ff;display:grid;place-items:center;font-weight:900}.station{font-size:30px;line-height:.9;letter-spacing:-2px;margin-top:12px;color:#171224;text-transform:uppercase}.track{margin-top:8px;color:#443957}.controls{display:grid;grid-template-columns:1.1fr 1fr 1fr;gap:8px;margin-top:14px}.moods{display:flex;gap:8px;overflow:auto;padding:14px 0 4px}.chip{flex:0 0 auto;border:3px solid var(--ink);background:#fff1bb;box-shadow:3px 3px 0 var(--shadow);padding:8px 10px}.chip.active{background:var(--accent);color:#fff}.list{display:grid;gap:8px;margin-top:12px}.row{display:grid;grid-template-columns:24px 1fr auto;gap:8px;align-items:center;padding:10px;border:3px solid var(--ink);background:#fff1bb;box-shadow:4px 4px 0 var(--shadow)}.row.active{background:#c8ff8c}@media(min-width:860px){.wrap{max-width:980px;padding-top:30px}.handheld{display:grid;grid-template-columns:1fr 310px;gap:18px}.screen{min-height:520px}.nav{position:static;margin-top:14px}}
</style></head><body><main class="wrap"><header class="brand"><h1>VibeChannel</h1><span>PIXEL POCKET</span></header><section class="pixel handheld"><div><div class="screen soft" id="screen"><div class="sky"><div class="stars">✦ ✦ ✦</div><div class="moon"></div></div><div class="radio-face"><div class="speaker"></div><div class="dial">92.4</div></div><h2 class="station" id="title">Groove<br>Salad</h2><p class="track" id="track">lofi / soft beats / night mode</p></div><div class="controls"><button class="btn active" id="play">play</button><button class="btn" id="scan">scan</button><button class="btn" id="fav">save</button></div><div class="moods"><button class="chip active">night</button><button class="chip">code</button><button class="chip">rain</button><button class="chip">jazz</button></div></div><aside><div class="tiny">stations</div><div class="list"><button class="row active" data-title="Groove\nSalad" data-track="lofi / soft beats / night mode"><span>▶</span><b>Groove Salad</b><span>92</span></button><button class="row" data-title="Rain\nBits" data-track="rain tape / tiny room / calm"><span>·</span><b>Rain Bits</b><span>88</span></button><button class="row" data-title="Moon\nJazz" data-track="pixel jazz / warm night / slow"><span>·</span><b>Moon Jazz</b><span>107</span></button></div><nav class="nav"><button class="active">эфир</button><button>станции</button><button>любимое</button><button>лог</button></nav></aside></section></main><div class="toast" id="toast">ok</div><script>const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)],toast=$('#toast');function ping(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1000)}$$('.row').forEach(r=>r.onclick=()=>{$$('.row').forEach(x=>{x.classList.remove('active');x.children[0].textContent='·'});r.classList.add('active');r.children[0].textContent='▶';$('#title').innerHTML=r.dataset.title.replace('\\n','<br>');$('#track').textContent=r.dataset.track;ping('station')});$('#play').onclick=()=>{$('#play').classList.toggle('active');$('#play').textContent=$('#play').classList.contains('active')?'play':'pause';ping($('#play').textContent)};$('#scan').onclick=()=>{let a=$$('.row');a[Math.floor(Math.random()*a.length)].click()};$('#fav').onclick=()=>ping('saved');$$('.chip').forEach(c=>c.onclick=()=>{$$('.chip').forEach(x=>x.classList.remove('active'));c.classList.add('active')})</script></body></html>
